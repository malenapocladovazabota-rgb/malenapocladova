<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FBF1E8">
<title>Демо · VIP-попап при оплате</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --cream:#FBF1E8; --cream2:#F5E6D6; --paper:#FFFCF7;
    --rose:#B23A48; --rose-d:#6E1E2B; --gold:#C9A876; --gold-d:#A9863F;
    --brown:#3D2C26; --brown2:#6B524A; --brown3:#8B6E63; --line:rgba(61,44,38,.13);
  }
  body{background:radial-gradient(120% 90% at 50% 0%, var(--cream) 0%, var(--cream2) 100%); color:var(--brown); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 18px; text-align:center;}
  .demo-note{position:fixed; top:14px; left:50%; transform:translateX(-50%); font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--brown3); background:var(--paper); border:1px solid var(--line); padding:7px 14px; border-radius:100px;}
  .hero h1{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:clamp(30px,6vw,44px); line-height:1.05; margin-bottom:8px;}
  .hero h1 em{font-style:italic; color:var(--rose-d);}
  .hero p{color:var(--brown2); margin-bottom:24px;}
  .cta{display:inline-flex; align-items:center; gap:8px; background:var(--rose-d); color:#fff; font-family:'DM Mono',monospace; font-weight:500; font-size:15px; letter-spacing:.03em; padding:18px 34px; border:none; border-radius:100px; cursor:pointer; box-shadow:0 14px 30px rgba(110,30,43,.3); transition:transform .15s, background .15s;}
  .cta:hover{transform:translateY(-2px); background:#8A2A38;}

  .ov{position:fixed; inset:0; background:rgba(45,30,25,.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .22s; z-index:100;}
  .ov.on{opacity:1; pointer-events:auto;}
  .modal{background:var(--paper); border-radius:22px; max-width:470px; width:100%; padding:26px 24px 24px; text-align:left; position:relative; box-shadow:0 30px 70px rgba(45,30,25,.4); transform:translateY(16px) scale(.97); transition:transform .26s cubic-bezier(.2,.8,.2,1); max-height:94vh; overflow:auto;}
  .ov.on .modal{transform:none;}
  .modal::before{content:''; position:absolute; top:0; left:0; right:0; height:5px; border-radius:22px 22px 0 0; background:linear-gradient(90deg,var(--rose-d),var(--gold));}
  .x{position:absolute; top:12px; right:15px; background:none; border:none; font-size:24px; color:var(--brown3); cursor:pointer; line-height:1;}
  .x:hover{color:var(--brown);}
  .card-lbl{font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--brown3); margin:4px 0 14px;}
  .item{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; padding-bottom:16px; border-bottom:1px solid var(--line);}
  .item .t{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:19px; color:var(--brown);}
  .item .d{font-size:12.5px; color:var(--brown2); margin-top:2px;}
  .item .p{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:19px;}

  .bump{margin:16px 0; border:2px dashed var(--gold-d); background:linear-gradient(180deg,#fff,#FDF3EC); border-radius:16px; padding:15px 15px 4px; transition:border-color .2s, box-shadow .2s;}
  .bump.on{border-style:solid; border-color:var(--rose-d); box-shadow:0 10px 26px rgba(110,30,43,.14);}
  .bump-top{display:flex; align-items:flex-start; gap:12px; cursor:pointer;}
  .bump-top input{appearance:none; -webkit-appearance:none; flex:0 0 auto; width:24px; height:24px; margin-top:2px; border:2px solid var(--gold-d); border-radius:7px; background:#fff; position:relative; cursor:pointer; transition:.15s;}
  .bump-top input:checked{background:var(--rose-d); border-color:var(--rose-d);}
  .bump-top input:checked::after{content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; font-weight:700;}
  .bump-h{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:18px; color:var(--rose-d); line-height:1.15;}
  .bump-h .plus{font-family:'DM Mono',monospace; font-size:12px; background:var(--rose-d); color:#fff; padding:2px 9px; border-radius:100px; margin-left:6px; vertical-align:middle;}
  .bump-sub{font-size:12.5px; color:var(--brown2); margin-top:3px;}
  .bump ul{list-style:none; margin:11px 0 11px 36px;}
  .bump li{font-size:13.5px; color:var(--brown); padding:4px 0 4px 22px; position:relative;}
  .bump li::before{content:'✓'; position:absolute; left:0; top:4px; color:var(--rose-d); font-weight:700;}

  .total{display:flex; justify-content:space-between; align-items:center; margin:6px 0 16px;}
  .total .lbl{font-family:'DM Mono',monospace; font-size:12px; letter-spacing:.12em; text-transform:uppercase; color:var(--brown3);}
  .total .val{font-family:'Cormorant Garamond',serif; font-weight:700; font-size:32px; color:var(--brown);}
  .total .val .old{font-size:18px; color:var(--brown3); text-decoration:line-through; margin-right:8px; font-weight:600;}
  .pay{display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:var(--rose-d); color:#fff; font-family:'DM Mono',monospace; font-weight:500; font-size:15px; letter-spacing:.03em; padding:18px; border:none; border-radius:100px; cursor:pointer; text-decoration:none; box-shadow:0 12px 26px rgba(110,30,43,.28); transition:transform .15s, background .15s;}
  .pay:hover{transform:translateY(-2px); background:#8A2A38;}
  .trust{text-align:center; font-size:12px; color:var(--brown3); margin-top:12px;}
</style>
</head>
<body>
  <div class="demo-note">Демо · нажмите кнопку</div>
  <div class="hero">
    <h1>3 дня. <em>3 рилс.</em></h1>
    <p>За три вечера снимаете три готовых Reels.</p>
    <button class="cta" id="payCta">Занять место за $15</button>
  </div>

  <div class="ov" id="ov">
    <div class="modal">
      <button class="x" id="mx" aria-label="Закрыть">&times;</button>
      <div class="card-lbl">Ваш заказ</div>

      <div class="item">
        <div>
          <div class="t">Интенсив «3 дня 3 рилс»</div>
          <div class="d">3 живых эфира · Telegram · розыгрыш MacBook</div>
        </div>
        <div class="p">$15</div>
      </div>

      <label class="bump" id="bump">
        <div class="bump-top">
          <input type="checkbox" id="vip">
          <div>
            <div class="bump-h">Добавить VIP-пакет <span class="plus">+$35</span></div>
            <div class="bump-sub">Максимум за три вечера, и $50 вернутся в счёт обучения.</div>
          </div>
        </div>
        <ul>
          <li>Разбор одного вашего Reels</li>
          <li>Записи всех трёх эфиров навсегда</li>
          <li>Шаблоны сценариев Reels и чек-лист монтажа в CapCut</li>
          <li>Гайд по монетизации, первые деньги с Reels</li>
          <li>Именной сертификат</li>
          <li>$50 идут в счёт обучения на курсе СММ</li>
        </ul>
      </label>

      <div class="total">
        <span class="lbl">Итого</span>
        <span class="val" id="total">$15</span>
      </div>
      <a class="pay" id="payBtn" href="#">Перейти к оплате · <span id="payAmt">$15</span></a>
      <div class="trust">Оплата картой через Stripe · доступ сразу после оплаты</div>
    </div>
  </div>

<script>
  var STD_LINK='https://link.fastpaydirect.com/payment-link/69e9529c7dd3512d920788c5';
  var VIP_LINK='https://link.fastpaydirect.com/payment-link/6a56cbdea655fa0b802a44cb';

  var ov=document.getElementById('ov'), vip=document.getElementById('vip'), bump=document.getElementById('bump'),
      total=document.getElementById('total'), payBtn=document.getElementById('payBtn'), payAmt=document.getElementById('payAmt');
  function track(ev,val){ if(window.fbq){ val?fbq('track',ev,val):fbq('trackCustom',ev); } console.log('track:',ev,val||''); }

  function upd(){
    if(vip.checked){
      bump.classList.add('on'); total.innerHTML='<span class="old">$15</span>$50';
      payAmt.textContent='$50'; payBtn.setAttribute('href', VIP_LINK);
    } else {
      bump.classList.remove('on'); total.textContent='$15';
      payAmt.textContent='$15'; payBtn.setAttribute('href', STD_LINK);
    }
  }
  document.getElementById('payCta').addEventListener('click', function(){ ov.classList.add('on'); track('CheckoutModalOpen'); track('InitiateCheckout',{value:15,currency:'USD'}); });
  function close(){ ov.classList.remove('on'); }
  document.getElementById('mx').addEventListener('click', close);
  ov.addEventListener('click', function(e){ if(e.target===ov) close(); });
  vip.addEventListener('change', function(){ upd(); track(vip.checked?'SelectVIP':'DeselectVIP'); });
  payBtn.addEventListener('click', function(){ track('Checkout_'+(vip.checked?'VIP':'Standard'), {value:vip.checked?50:15,currency:'USD'}); });
  upd();
</script>
</body>
</html>
